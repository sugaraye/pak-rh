<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
Informations administratives - PAK RH
</title>

<link rel="stylesheet"
href="assets/css/style.css">

<style>

.card{
    max-width:1100px;
    margin:40px auto;
    background:white;
    padding:40px;
    border-radius:20px;
}

.etape{
    color:#666;
    font-size:14px;
    margin-bottom:10px;
}

.progress{
    height:20px;
    background:#e5e5e5;
    border-radius:50px;
    overflow:hidden;
    margin-bottom:10px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#009fe3;
    transition:0.5s;
}

#pourcentage{
    color:#555;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

input{
    width:100%;
    padding:15px;
    border:1px solid #ddd;
    border-radius:10px;
    box-sizing:border-box;
}

.actions{
    display:flex;
    justify-content:space-between;
    margin-top:40px;
}

.btn{
    display:inline-block;
    padding:15px 30px;
    border-radius:10px;
    text-decoration:none;
    border:none;
    cursor:pointer;
}

.btn-retour{
    background:#6c757d;
    color:white;
}

.btn-enregistrer{
    background:#003B7A;
    color:white;
}

.btn-suivant{
    background:#009fe3;
    color:white;
}

.btn-suivant.disabled{
    background:#cccccc;
    pointer-events:none;
}

.success{
    background:#ecfdf5;
    color:#166534;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
}

@media(max-width:768px){

.grid{
    grid-template-columns:1fr;
}

.actions{
    flex-direction:column;
    gap:15px;
}

}

</style>

</head>

<body>

<div class="card">

<div class="etape">
Étape 2 sur 5
</div>

<h1>
Informations administratives
</h1>

<div class="progress">

<div
id="barre"
class="progress-bar">
</div>

</div>

<p id="pourcentage">
20 % complété
</p>

<form id="adminForm">

<div class="grid">

<input
type="text"
id="matricule"
placeholder="Matricule PAK">

<input
type="text"
id="direction"
placeholder="Direction"
required>

<input
type="text"
id="departement"
placeholder="Département"
required>

<input
type="text"
id="service"
placeholder="Service"
required>

<input
type="text"
id="poste"
placeholder="Poste"
required>

<input
type="text"
id="grade"
placeholder="Grade"
required>

<input
type="text"
id="categorie"
placeholder="Catégorie"
required>

<input
type="text"
id="echelon"
placeholder="Échelon"
required>

<input
type="date"
id="date_entree"
required>

<input
type="date"
id="date_prise_service"
required>

<input
type="text"
id="type_contrat"
placeholder="Type de contrat"
required>

<input
type="text"
id="superieur_hierarchique"
placeholder="Supérieur hiérarchique"
required>

</div>

<div class="actions">

<a
href="dashboard.html"
class="btn btn-retour">

← Tableau de bord

</a>

<button
type="submit"
class="btn btn-enregistrer">

Enregistrer

</button>

<a
href="experiences.html"
id="btnSuivant"
class="btn btn-suivant disabled">

Étape suivante →

</a>

</div>

</form>

<div id="message"></div>

</div>

<script src="assets/js/administrative.js"></script>

</body>
</html>
