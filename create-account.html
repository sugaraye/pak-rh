<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Créer mon compte - PAK RH</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<div class="card">

<h1>Créer mon compte</h1>

<form id="createForm">

<input
type="text"
id="nom"
placeholder="Nom"
required>

<input
type="text"
id="prenom"
placeholder="Prénom"
required>

<input
type="date"
id="dateNaissance"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="text"
id="telephone"
placeholder="Téléphone"
required>

<input
type="text"
id="direction"
placeholder="Direction">

<input
type="text"
id="service"
placeholder="Service">

<input
type="text"
id="poste"
placeholder="Poste">

<button type="submit">
Créer mon compte
</button>

</form>

<div id="resultat"></div>

</div>

<script src="assets/js/auth.js"></script>

</body>
</html>
