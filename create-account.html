<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Créer mon compte - PAK RH</title>

<link rel="stylesheet" href="assets/css/style.css">

<style>
.card{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:40px;
    border-radius:20px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:20px;
    border:1px solid #ddd;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    background:#003B7A;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:10px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="card">

<h1>Créer mon compte</h1>

<p>
Veuillez renseigner vos informations pour créer votre compte RH.
</p>

<form id="createForm">

<input
type="text"
id="nom"
placeholder="Nom"
required>

<input
type="text"
id="prenom"
placeholder="Prénom"
required>

<input
type="date"
id="dateNaissance"
required>

<input
type="email"
id="email"
placeholder="Adresse email"
required>

<input
type="text"
id="telephone"
placeholder="Téléphone"
required>

<input
type="text"
id="direction"
placeholder="Direction">

<input
type="text"
id="service"
placeholder="Service">

<input
type="text"
id="poste"
placeholder="Poste">

<input
type="text"
id="grade"
placeholder="Grade (facultatif)">

<input
type="text"
id="matricule"
placeholder="Matricule PAK (facultatif)">

<label>
<input
type="checkbox"
required>

Je certifie être employé du Port Autonome de Kribi.
</label>

<br><br>

<button type="submit">
Créer mon compte
</button>

</form>

<div id="resultat"></div>

</div>

<script src="assets/js/auth.js"></script>

</body>
</html>
