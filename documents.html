<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
Documents justificatifs - PAK RH
</title>

<link rel="stylesheet"
href="assets/css/style.css">

<style>

.card{
max-width:1100px;
margin:40px auto;
background:white;
padding:40px;
border-radius:20px;
}

.etape{
color:#666;
font-size:14px;
margin-bottom:10px;
}

.progress{
height:20px;
background:#e5e5e5;
border-radius:50px;
overflow:hidden;
margin-bottom:10px;
}

.progress-bar{
height:100%;
width:0%;
background:#009fe3;
transition:.5s;
}

#pourcentage{
color:#555;
margin-bottom:30px;
}

.bloc{
background:#f8f8f8;
padding:25px;
border-radius:15px;
margin-top:20px;
}

select,
input{
width:100%;
padding:15px;
margin-top:15px;
border:1px solid #ddd;
border-radius:10px;
}

button{
background:#003B7A;
color:white;
border:none;
padding:15px 30px;
border-radius:10px;
cursor:pointer;
margin-top:20px;
}

.document{
background:white;
padding:20px;
border-radius:15px;
margin-top:15px;
}

.success{
background:#ecfdf5;
color:#166534;
padding:20px;
border-radius:15px;
margin-top:20px;
}

.actions{
display:flex;
justify-content:space-between;
margin-top:40px;
}

.btn{
display:inline-block;
padding:15px 30px;
border-radius:10px;
text-decoration:none;
color:white;
}

.btn-retour{
background:#6c757d;
}

.btn-suivant{
background:#009fe3;
}

.btn-suivant.disabled{
background:#cccccc;
pointer-events:none;
}

@media(max-width:768px){

.actions{
flex-direction:column;
gap:15px;
}

}

</style>

</head>

<body>

<div class="card">

<div class="etape">
Étape 5 sur 5
</div>

<h1>
Documents justificatifs
</h1>

<div class="progress">
<div
id="barre"
class="progress-bar">
</div>
</div>

<p id="pourcentage">
80 % complété
</p>

<div class="bloc">

<h3>
Déposer un document
</h3>

<select id="type_document">

<option value="">
Choisir le type de document
</option>

<option value="cv">
Curriculum Vitae
</option>

<option value="identites">
Carte Nationale d'Identité
</option>

<option value="photos">
Photo d'identité
</option>

<option value="diplomes">
Diplôme
</option>

<option value="attestations">
Attestation de formation
</option>

</select>

<input
type="file"
id="fichier">

<button
id="envoyer">

Téléverser

</button>

<div id="message"></div>

</div>

<hr>

<h2>
Documents déposés
</h2>

<div id="liste"></div>

<div class="actions">

<a
href="dashboard.html"
class="btn btn-retour">

← Tableau de bord

</a>

<a
href="soumission.html"
id="btnSuivant"
class="btn btn-suivant disabled">

Soumettre mon dossier →

</a>

</div>

</div>

<script src="assets/js/documents.js"></script>

</body>
</html>
