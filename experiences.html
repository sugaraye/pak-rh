<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
Expériences professionnelles - PAK RH
</title>

<link rel="stylesheet"
href="assets/css/style.css">

<style>

.card{
max-width:1100px;
margin:40px auto;
background:white;
padding:40px;
border-radius:20px;
}

.etape{
color:#666;
font-size:14px;
margin-bottom:10px;
}

.progress{
height:20px;
background:#e5e5e5;
border-radius:50px;
overflow:hidden;
margin-bottom:10px;
}

.progress-bar{
height:100%;
width:0%;
background:#009fe3;
transition:.5s;
}

#pourcentage{
color:#555;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

input,
textarea{
width:100%;
padding:15px;
border:1px solid #ddd;
border-radius:10px;
box-sizing:border-box;
}

textarea{
grid-column:1 / -1;
}

button{
background:#003B7A;
color:white;
border:none;
padding:15px 30px;
border-radius:10px;
cursor:pointer;
}

.actions{
display:flex;
justify-content:space-between;
margin-top:40px;
}

.btn{
display:inline-block;
padding:15px 30px;
border-radius:10px;
text-decoration:none;
color:white;
}

.btn-retour{
background:#6c757d;
}

.btn-suivant{
background:#009fe3;
}

.btn-suivant.disabled{
background:#cccccc;
pointer-events:none;
}

.experience{
background:#f8f8f8;
padding:20px;
border-radius:15px;
margin-top:20px;
}

.supprimer{
background:#dc2626;
margin-top:15px;
}

.success{
background:#ecfdf5;
color:#166534;
padding:20px;
border-radius:15px;
margin-top:20px;
}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

.actions{
flex-direction:column;
gap:15px;
}

}

</style>

</head>

<body>

<div class="card">

<div class="etape">
Étape 3 sur 5
</div>

<h1>
Expériences professionnelles
</h1>

<div class="progress">
<div
id="barre"
class="progress-bar">
</div>
</div>

<p id="pourcentage">
40 % complété
</p>

<form id="experienceForm">

<div class="grid">

<input
type="date"
id="date_debut"
required>

<input
type="date"
id="date_fin">

<input
type="text"
id="fonction"
placeholder="Fonction occupée"
required>

<input
type="text"
id="service"
placeholder="Service"
required>

<input
type="text"
id="employeur"
placeholder="Employeur"
required>

<input
type="text"
id="ville"
placeholder="Ville">

<input
type="text"
id="pays"
placeholder="Pays">

<textarea
id="description"
rows="5"
placeholder="Description de l'expérience">
</textarea>

</div>

<br>

<button type="submit">
Ajouter l'expérience
</button>

</form>

<div id="message"></div>

<hr>

<h2>
Mes expériences
</h2>

<div id="liste"></div>

<div class="actions">

<a
href="dashboard.html"
class="btn btn-retour">

← Tableau de bord

</a>

<a
href="diplomes.html"
id="btnSuivant"
class="btn btn-suivant disabled">

Étape suivante →

</a>

</div>

</div>

<script src="assets/js/experiences.js"></script>

</body>
</html>
